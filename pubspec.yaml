name: birthday
description: Birthday Buddy - A cartoonish birthday reminder app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Utilities
  intl: '>=0.19.0 <1.0.0'
  shared_preferences: ^2.3.2
  uuid: ^4.4.0
  path: ^1.9.0
  path_provider: ^2.1.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Models / Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Database
  sqflite: ^2.3.3

  # Animations
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  flutter_screenutil: ^5.9.3

  # Media
  image_picker: ^1.1.2

  # WhatsApp / URL
  url_launcher: ^6.3.0
  share_plus: 12.0.1

  # Contacts
  permission_handler: ^11.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700

workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      groups:
        - bbgroups
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android APK (debug)
        script: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUE_CAT_API_KEY=$REVENUE_CAT_API_KEY

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      groups:
        - bbgroups
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android AAB (release)
        script: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUE_CAT_API_KEY=$REVENUE_CAT_API_KEY

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

  ios-testflight:
    name: iOS TestFlight Release
    max_build_duration: 60
    integrations:
      app_store_connect: CodeMagic API Key
    environment:
      groups:
        - bbgroups
      flutter: stable
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.birthdaybuddy.birthday

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Set build number
        script: |
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID" 2>/dev/null || echo "0")
          cd ios && agvtool new-version -all $((LATEST_BUILD + 1))

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          # Encode dart-defines exactly as Flutter does: each value base64-encoded, comma-joined
          DART_DEFINES=$(printf '%s' \
            "$(echo -n "SUPABASE_URL=$SUPABASE_URL" | base64)," \
            "$(echo -n "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" | base64)," \
            "$(echo -n "REVENUE_CAT_API_KEY=$REVENUE_CAT_API_KEY" | base64)" \
          )

          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            DART_DEFINES="$DART_DEFINES" \
            DART_OBFUSCATION=false \
            TRACK_WIDGET_CREATION=false \
            TREE_SHAKE_ICONS=false \
            PACKAGE_CONFIG=".dart_tool/package_config.json" \
            archive

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.birthdaybuddy.birthday</key>
              <string>Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa

      - name: Upload dSYMs to Firebase Crashlytics
        script: |
          find build/ios/archive/Runner.xcarchive -name "*.dSYM" | \
          xargs -I {} \
            ios/Pods/FirebaseCrashlytics/upload-symbols \
            -gsp ios/Runner/GoogleService-Info.plist \
            -p ios {}

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/Runner.xcarchive/dSYMs/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

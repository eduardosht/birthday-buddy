workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      groups:
        - bbgroups
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android APK (debug)
        script: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUE_CAT_API_KEY=$REVENUE_CAT_API_KEY

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      groups:
        - bbgroups
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android AAB (release)
        script: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUE_CAT_API_KEY=$REVENUE_CAT_API_KEY

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

  ios-testflight:
    name: iOS TestFlight Release
    max_build_duration: 60
    integrations:
      app_store_connect: CodeMagic API Key
    environment:
      groups:
        - bbgroups
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.birthdaybuddy.birthday

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Flutter build (no codesign)
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUE_CAT_API_KEY=$REVENUE_CAT_API_KEY

      - name: Archive and export IPA
        script: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            archive

          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --archive-path build/ios/archive/Runner.xcarchive

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
